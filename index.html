<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Style Prompt Creator</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="StyleGen">
    
    <link rel="icon" type="image/png" href="https://img.icons8.com/ios-filled/512/suit.png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/512/suit.png">

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif; background-color: #f4f7f9; padding: 20px; color: #333; margin: 0; }
        .container { max-width: 500px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin: auto; }
        h2 { text-align: center; color: #2c3e50; font-size: 1.4em; margin-bottom: 25px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .section { margin-bottom: 18px; padding: 12px; background: #fdfdfd; border-radius: 12px; border: 1px solid #eee; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9em; color: #555; }
        select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; background: #fff; font-size: 16px; appearance: none; }
        
        .radio-group { display: flex; gap: 10px; }
        .radio-option { flex: 1; text-align: center; background: white; padding: 10px; border: 1px solid #ddd; border-radius: 10px; font-size: 0.85em; }
        .radio-option input { margin-right: 5px; }

        .action-toggle { background: #ebf5fb; border-color: #3498db; }

        button { width: 100%; padding: 16px; background-color: #2c3e50; color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 1.1em; font-weight: bold; margin-top: 10px; -webkit-tap-highlight-color: transparent; }
        button:active { background-color: #34495e; transform: scale(0.98); }
        
        #output-container { margin-top: 20px; padding: 15px; background: #d4e6f1; border-radius: 12px; display: none; animation: fadeIn 0.3s; }
        #promptText { font-size: 0.95em; line-height: 1.4; color: #1a2a3a; margin: 0; word-wrap: break-word; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #copyToast { visibility: hidden; min-width: 150px; background-color: #27ae60; color: white; text-align: center; border-radius: 50px; padding: 12px; position: fixed; z-index: 1; bottom: 40px; left: 50%; transform: translateX(-50%); font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #copyToast.show { visibility: visible; animation: popUp 0.3s, fadeOut 0.5s 1.5s; }

        @keyframes popUp { from { bottom: 0; opacity: 0; } to { bottom: 40px; opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Style Creator</h2>

    <div class="section">
        <label>Outerwear</label>
        <select id="outerwearType">
            <option value="">None</option>
            <option value="Harrington jacket with normal collar">Harrington Jacket</option>
            <option value="crew neck sweater">Crew Neck Sweater</option>
            <option value="v-neck sweater">V-Neck Sweater</option>
            <option value="sweater vest">Sweater Vest</option>
            <option value="waistcoat">Waistcoat</option>
        </select>
        <select id="outerwearColor">
            <option value="dark tan">Dark Tan</option>
            <option value="dark brown">Dark Brown</option>
            <option value="very dark olive">Dark Olive</option>
            <option value="forest green">Forest Green</option>
            <option value="dark grey">Dark Grey</option>
            <option value="navy">Navy</option>
            <option value="charcoal">Charcoal</option>
            <option value="grey">Grey</option>
            <option value="dark brown">Dark Brown</option>
        </select>
    </div>

    <div class="section">
        <label>Shirt</label>
        <select id="shirtType">
            <option value="">None</option>
            <option value="dress shirt">Dress Shirt</option>
            <option value="polo shirt">Polo Shirt</option>
            <option value="short sleeve button-down">Short Sleeve Button-Down</option>
        </select>
        <select id="shirtColor">
            <option value="white">White</option>
            <option value="maroon">Maroon</option>
            <option value="muted purple">Muted Purple</option>
            <option value="dark forest green">Dark Forest Green</option>
            <option value="brown">Brown</option>
            <option value="navy">Navy</option>
            <option value="vertical small striped light blue">Striped Light Blue</option>
            <option value="Earthy Brown and blue large vertically striped">Brown Striped</option>
            <option value="Vertical Blue Black and White striped">Striped Blue</option>
            <option value="Black Pinstriped">Black Pinstripe</option>
            <option value="cream">Cream</option>
            <option value="brown with contrast collar">Brown With Contrast Collar</option>
        </select>
    </div>

    <div class="section">
        <label>Pants</label>
        <select id="pantsType">
            <option value="">None</option>
            <option value="dress pants">Dress Pants</option>
            <option value="loose dress pants">Loose Dress Pants</option>
            <option value="chinos">Chinos</option>
            <option value="jeans">Jeans</option>
        </select>
        <select id="pantsColor">
            <option value="khaki">Khaki</option>
            <option value="dark grey">Dark Grey</option>
            <option value="light grey">Light Grey</option>
            <option value="indigo blue">Indigo Blue</option>
            <option value="chocolate">Chocolate</option>
            <option value="brown">Brown</option>
            <option value="black">Black</option>
        </select>
    </div>

    <div class="section">
        <label>Accessories</label>
        <div class="radio-group">
            <div class="radio-option">
                <input type="radio" id="brownAcc" name="accSet" value="a brown belt and brown oxford sneakers" checked>
                <label for="brownAcc">Brown</label>
            </div>
            <div class="radio-option">
                <input type="radio" id="blackAcc" name="accSet" value="a black belt and black dress shoes">
                <label for="blackAcc">Black</label>
            </div>
        </div>
    </div>

    <div class="section action-toggle">
        <label>Mode</label>
        <div class="radio-group">
            <div class="radio-option">
                <input type="radio" id="modifyMode" name="actionMode" value="Modify" checked>
                <label for="modifyMode">Modify</label>
            </div>
            <div class="radio-option">
                <input type="radio" id="createMode" name="actionMode" value="Create">
                <label for="createMode">Create</label>
            </div>
        </div>
    </div>

    <button onclick="generateAndCopy()">Generate & Copy</button>

    <div id="output-container">
        <p id="promptText"></p>
    </div>
</div>

<div id="copyToast">Copied!</div>

<script>
    function generateAndCopy() {
        const selections = [];
        const outType = document.getElementById('outerwearType').value;
        const outCol = document.getElementById('outerwearColor').value;
        const shirtType = document.getElementById('shirtType').value;
        const shirtCol = document.getElementById('shirtColor').value;
        const pantsType = document.getElementById('pantsType').value;
        const pantsColor = document.getElementById('pantsColor').value;
        const accValue = document.querySelector('input[name="accSet"]:checked').value;
        const actionMode = document.querySelector('input[name="actionMode"]:checked').value;

        if (outType) selections.push(`a ${outCol} ${outType}`);
        if (shirtType) selections.push(`a ${shirtCol} ${shirtType}`);
        if (pantsType) selections.push(`${pantsColor} ${pantsType}`);

        let clothesStr = selections.join(", ");
        let startStr = (actionMode === "Modify") 
            ? "Modify this image so the guy is wearing " 
            : "Create an image of a guy wearing ";

        const finalPrompt = `${startStr}${clothesStr}, paired with ${accValue}.`;

        document.getElementById('promptText').innerText = finalPrompt;
        document.getElementById('output-container').style.display = 'block';

        navigator.clipboard.writeText(finalPrompt).then(() => {
            showToast();
        });
    }

    function showToast() {
        const toast = document.getElementById("copyToast");
        toast.className = "show";
        setTimeout(() => { toast.className = ""; }, 2000);
    }
</script>

</body>
</html>
